<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/static/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/main.css" />
    <title>SHA-257</title>
    <style>
	</style>
  </head>
  <body>
    <canvas id="matrix-canvas"></canvas>
    <div id="matrix-overlay"></div>
    <div id="topbar">
      <div id="topbar-auth">
        <a href="#/login" id="topbar-login" class="topbar-btn">Login</a>
        <a href="#/signup" id="topbar-signup" class="topbar-btn">Sign Up</a>
      </div>
      <a href="#/account" id="topbar-profile" class="profile-icon" title="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
        </svg>
      </a>
    </div>
    <nav>
      <button id="nav-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <a href="#/" data-route="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon hearye-hidden"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon hearye-only">
          <!-- Roof -->
          <path d="M2 11 L12 3 L22 11"/>
          <!-- Walls -->
          <path d="M4 11 L4 22 L20 22 L20 11"/>
          <!-- Chimney -->
          <rect x="16" y="4" width="3" height="8" rx="0.5"/>
          <!-- Chimney smoke slot -->
          <line x1="17.5" y1="4" x2="17.5" y2="3"/>
          <!-- Left window -->
          <rect x="5" y="14" width="4" height="4" rx="0.5"/>
          <line x1="7" y1="14" x2="7" y2="18"/>
          <line x1="5" y1="16" x2="9" y2="16"/>
          <!-- Right window -->
          <rect x="15" y="14" width="4" height="4" rx="0.5"/>
          <line x1="17" y1="14" x2="17" y2="18"/>
          <line x1="15" y1="16" x2="19" y2="16"/>
          <!-- Arched door -->
          <path d="M10 22 L10 18 Q10 15.5 12 15.5 Q14 15.5 14 18 L14 22"/>
        </svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="#/chat" data-route="/chat" id="nav-chat">
        <span class="nav-icon nav-icon-terminal" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85em; font-weight: 600; width: 16px; display: inline-block;">&#62;_</span>
        <svg class="nav-icon nav-icon-quill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M20 3 C22 9 19 16 11 20 L7 22"/>
          <path d="M20 3 C16 5 12 11 10 20"/>
          <path d="M20 3 L11 19"/>
          <path d="M10 20 L7 22 L9 18 Z"/>
          <path d="M17 7 C15 10 13 14 12 17"/>
        </svg>
        <span class="nav-label">New Chat</span>
      </a>
      <a href="#/chat" id="nav-new-chat" style="display:none;">
        <span class="nav-icon nav-icon-terminal" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85em; font-weight: 600; width: 16px; display: inline-block;">&#62;_</span>
        <svg class="nav-icon nav-icon-quill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M20 3 C22 9 19 16 11 20 L7 22"/>
          <path d="M20 3 C16 5 12 11 10 20"/>
          <path d="M20 3 L11 19"/>
          <path d="M10 20 L7 22 L9 18 Z"/>
          <path d="M17 7 C15 10 13 14 12 17"/>
        </svg>
        <span class="nav-label">New Chat</span>
      </a>
      <div id="sidebar-chats"></div>
      <a href="#/history" id="nav-history" data-route="/history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon hearye-hidden"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon hearye-only">
          <!-- Pediment -->
          <path d="M3 8 L12 2 L21 8"/>
          <!-- Entablature -->
          <rect x="3" y="8" width="18" height="2"/>
          <!-- 5 columns -->
          <line x1="5.5" y1="10" x2="5.5" y2="18"/>
          <line x1="8.8" y1="10" x2="8.8" y2="18"/>
          <line x1="12" y1="10" x2="12" y2="18"/>
          <line x1="15.2" y1="10" x2="15.2" y2="18"/>
          <line x1="18.5" y1="10" x2="18.5" y2="18"/>
          <!-- Stylobate -->
          <rect x="3" y="18" width="18" height="1.5"/>
          <!-- Steps -->
          <line x1="1.5" y1="19.5" x2="22.5" y2="19.5"/>
          <line x1="0.5" y1="21" x2="23.5" y2="21"/>
        </svg>
        <span class="nav-label">History</span>
      </a>
    </nav>
    <div id="app"></div>
    

    <script type="module" src="/src/router.ts"></script>
    <script>
      document.getElementById('nav-toggle').addEventListener('click', function() {
        document.body.classList.toggle('nav-collapsed');
        localStorage.setItem('navCollapsed', document.body.classList.contains('nav-collapsed') ? '1' : '0');
      });
      if (localStorage.getItem('navCollapsed') === '1') {
        document.body.classList.add('nav-collapsed');
      }
    </script>
  </body>
</html>
