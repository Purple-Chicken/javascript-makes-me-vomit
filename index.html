<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/static/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/main.css" />
    <title>SHA-257</title>
    <style>
	</style>
  </head>
  <body>
    <canvas id="matrix-canvas"></canvas>
    <div id="matrix-overlay"></div>
    <div id="topbar">
      <div id="topbar-auth">
        <a href="#/login" id="topbar-login" class="topbar-btn">Login</a>
        <a href="#/signup" id="topbar-signup" class="topbar-btn">Sign Up</a>
      </div>
      <div id="profile-dropdown-wrap">
        <button id="topbar-profile" class="profile-icon" title="Account" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div id="profile-dropdown" class="profile-dropdown" style="display:none;">
          <div class="profile-dropdown-username" id="profile-dropdown-username">—</div>
          <button class="profile-dropdown-item" id="profile-dropdown-tokens-btn" type="button" title="View token usage note">Token Usage</button>
          <div class="profile-dropdown-username" id="profile-dropdown-tokens" style="display:none; font-size: 0.85em;">Exact token usage is shown only when the model provider reports it.</div>
          <a href="#/account" class="profile-dropdown-item" id="profile-dropdown-settings">Account Settings</a>
          <button class="profile-dropdown-item profile-dropdown-logout" id="profile-dropdown-logout" type="button">Logout</button>
        </div>
      </div>
    </div>
    <nav>
      <button id="nav-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <a href="#/" data-route="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span>
      </a>
      <a href="#/chat" data-route="/chat" id="nav-chat">
        <span class="nav-icon" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85em; font-weight: 600; width: 16px; display: inline-block;">&#62;_</span>
        <span class="nav-label">New Chat</span>
      </a>
      <a href="#/chat" id="nav-new-chat" style="display:none;">
        <span class="nav-icon" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85em; font-weight: 600; width: 16px; display: inline-block;">&#62;_</span>
        <span class="nav-label">New Chat</span>
      </a>
      <div id="sidebar-chats"></div>
      <a href="#/history" id="nav-history" data-route="/history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-label">History</span>
      </a>
      <a href="#/settings" id="nav-settings" data-route="/settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V22a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.4.49.62 1.1.6 1.73"/></svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>
    <div id="app"></div>
    

    <script type="module" src="/src/router.ts"></script>
    <script>
      document.getElementById('nav-toggle').addEventListener('click', function() {
        document.body.classList.toggle('nav-collapsed');
        localStorage.setItem('navCollapsed', document.body.classList.contains('nav-collapsed') ? '1' : '0');
      });
      if (localStorage.getItem('navCollapsed') !== '0') {
        document.body.classList.add('nav-collapsed');
      }
    </script>
  </body>
</html>
