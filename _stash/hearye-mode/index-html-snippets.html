<!-- CHAT LINK — add quill variant alongside terminal variant: -->
<!--
  The chat nav link uses two icon variants:
  - .nav-icon-terminal  (>_ text span — shown in dark mode)
  - .nav-icon-quill     (SVG quill — shown in hearye mode; add display:none to base CSS, hearye-mode overrides to inline-block)

  <span class="nav-icon nav-icon-terminal" ...>&#62;_</span>
  <svg class="nav-icon nav-icon-quill" ...>...</svg>

  In base CSS: .nav-icon-quill { display: none; }
  In hearye CSS: body.hearye-mode .nav-icon-terminal { display: none !important; }
                 body.hearye-mode .nav-icon-quill { display: inline-block; ... }
